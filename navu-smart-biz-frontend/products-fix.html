<script>

/* ================= PRODUCTS (PUBLIC FIX) ================= */

async function loadProducts() {
  const res = await fetch(API_BASE + "/products/public/all");
  const products = await res.json();

  const ul = document.getElementById("productsList");
  ul.innerHTML = "";

  products.forEach(p => {
    const li = document.createElement("li");
    li.innerHTML = `<strong>${p.name}</strong> — KES ${p.price}`;
    ul.appendChild(li);
  });
}

async function addProduct() {
  const msg = document.getElementById("productMsg");
  msg.innerText = "Adding...";

  try {
    const res = await fetch(API_BASE + "/products/public/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("newProductName").value,
        price: Number(document.getElementById("newProductPrice").value)
      })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = data.message || "Error ❌";
      return;
    }

    msg.innerText = "Product added ✅";

    document.getElementById("newProductName").value = "";
    document.getElementById("newProductPrice").value = "";

    loadProducts();

  } catch (err) {
    console.log(err);
    msg.innerText = "Failed ❌";
  }
}

/* HOOK INTO VIEW */
const oldShowViewProducts = showView;
showView = function(view) {
  oldShowViewProducts(view);
  if (view === "products") loadProducts();
};

</script>
