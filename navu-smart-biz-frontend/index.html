<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SmartBiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- AUTH -->
<div id="authScreen" class="center-screen">
  <div class="auth-card">
    <h2>SmartBiz Login</h2>

    <input id="whatsapp" placeholder="WhatsApp Number" />

    <input id="businessName" placeholder="Business Name" />

    <button onclick="login()">Enter SmartBiz</button>

    <p id="authMsg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div class="layout">

    <aside class="sidebar">
      <h2>SmartBiz</h2>

      <nav>
        <button onclick="showView('dashboard')">Dashboard</button>
        <button onclick="showView('sales')">Sales</button>
        <button onclick="showView('income')">Income</button>

        <button onclick="showView('cash')">Cash</button>

        <button onclick="showView('products')">Products</button>
        <button onclick="showView('orders')">Orders</button>
        <button onclick="showView('customers')">Customers</button>

        <button onclick="showView('profile')">Business Profile</button>

        <button class="logout" onclick="logout()">
          Logout
        </button>
      </nav>
    </aside>

    <main class="content">

      <!-- DASHBOARD -->
      <section id="dashboard" class="view">

        <h1>Dashboard</h1>

        <div class="dashboard-grid">

          <div class="card">
            <h3>Total Sales</h3>
            <p id="totalSales">0</p>
          </div>

          <div class="card">
            <h3>Wallet</h3>
            <p id="walletBalance">KES 0</p>
          </div>

          <div class="card">
            <h3>Revenue</h3>
            <p id="revenue">KES 0</p>
          </div>

          <div class="card">
            <h3>Expenses</h3>
            <p id="expenses">KES 0</p>
          </div>

          <div class="card">
            <h3>Profit</h3>
            <p id="profit">KES 0</p>
          </div>

          <div class="card">
            <h3>Orders</h3>
            <p id="orders">0</p>
          </div>

        </div>

      </section>

      <!-- CASH POS -->
      <section id="cash" class="view hidden">

        <h1>Cash POS</h1>

        <div class="product-form">

          <input
            id="cashProduct"
            placeholder="Product Name"
          />

          <input
            id="cashAmount"
            type="number"
            placeholder="Amount (KES)"
          />

          <button onclick="sellCashProduct()">
            Record Cash Sale
          </button>

          <p id="cashMsg"></p>

        </div>

      </section>

      <!-- PRODUCTS -->
      <section id="products" class="view hidden">

        <h1>Products</h1>

        <div class="product-form">

          <input
            id="newProductName"
            placeholder="Product name"
          />

          <input
            id="newProductPrice"
            type="number"
            placeholder="Price (KES)"
          />

          <button onclick="addProduct()">
            Add Product
          </button>

          <p id="productMsg"></p>

        </div>

        <ul id="productsList"></ul>

      </section>

    </main>
  </div>
</div>

<script src="app.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const token = localStorage.getItem("token");

  const auth = document.getElementById("authScreen");

  const app = document.getElementById("app");

  if (token) {

    auth.style.display = "none";

    app.style.display = "block";

    if (typeof showView === "function") {
      showView("dashboard");
    }

  } else {

    auth.style.display = "flex";

    app.style.display = "none";
  }
});
</script>

</body>
</html>
